<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saque de Recompensas</title>
    <!-- Incluindo o Tailwind via CDN para garantir que os estilos funcionem diretamente -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Variáveis de cor baseadas no seu tema original */
        :root {
            --background: 240 10% 3.9%;
            --foreground: 0 0% 98%;
            --card: 240 10% 3.9%;
            --card-foreground: 0 0% 98%;
            --border: 240 3.7% 15.9%;
            --muted: 240 3.7% 15.9%;
            --muted-foreground: 240 5% 64.9%;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 antialiased min-h-screen">

    <div id="root">
        <div class="min-h-screen">
            
            <!-- Cabeçalho Fixo -->
            <div class="fixed top-0 left-0 right-0 z-50 bg-white/80 backdrop-blur-xl border-b border-gray-200">
                <div class="max-w-2xl mx-auto px-6 h-14 flex items-center justify-between">
                    <div class="w-16"></div>
                    <span class="font-bold text-lg tracking-tight">Portal de Saque</span>
                    <div class="w-16"></div>
                </div>
                <!-- Barra de Progresso em 100% -->
                <div class="h-1 bg-gray-100">
                    <div class="h-full bg-green-500 transition-all duration-500 ease-out" style="width: 100%;"></div>
                </div>
            </div>

            <!-- Conteúdo Principal -->
            <div class="pt-24 pb-32 px-6">
                <div class="max-w-md mx-auto">
                    
                    <div class="text-center mb-8 animate-fade-in">
                        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-green-100 mb-4">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                            </svg>
                        </div>
                        <h1 class="text-2xl font-bold mb-2 text-gray-800">Avaliações Concluídas!</h1>
                        <p class="text-sm text-gray-500">Cadastre sua chave PIX abaixo para receber o saldo acumulado diretamente na sua conta.</p>
                    </div>

                    <!-- Formulário PIX -->
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                        <form class="space-y-5">
                            
                            <!-- Select: Tipo de Chave -->
                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-1">Tipo de Chave PIX</label>
                                <select class="w-full px-4 py-3 rounded-xl border border-gray-300 bg-gray-50 text-gray-800 focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition-all appearance-none">
                                    <option value="" disabled selected>Selecione o tipo de chave</option>
                                    <option value="cpf">CPF / CNPJ</option>
                                    <option value="phone">Telefone Celular</option>
                                    <option value="email">E-mail</option>
                                    <option value="random">Chave Aleatória</option>
                                </select>
                            </div>

                            <!-- Input: Chave -->
                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-1">Sua Chave PIX</label>
                                <input type="text" placeholder="Digite sua chave aqui" class="w-full px-4 py-3 rounded-xl border border-gray-300 bg-gray-50 text-gray-800 focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition-all">
                            </div>

                            <!-- Input: Nome Completo -->
                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-1">Nome do Titular da Conta</label>
                                <input type="text" placeholder="Como aparece no seu banco" class="w-full px-4 py-3 rounded-xl border border-gray-300 bg-gray-50 text-gray-800 focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition-all">
                            </div>

                            <!-- Botão de Ação -->
                            <button type="button" class="w-full mt-4 flex items-center justify-center gap-2 bg-green-500 hover:bg-green-600 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-green-500/20 active:scale-[0.98]">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                    <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd" />
                                </svg>
                                Realizar Saque de R$ 127,50
                            </button>

                        </form>
                    </div>
                </div>
            </div>

            <!-- Rodapé Fixo -->
            <div class="fixed bottom-0 left-0 right-0 z-40 bg-white/90 backdrop-blur-xl border-t border-gray-200">
                <div class="max-w-md mx-auto px-6 py-4 flex items-center justify-between">
                    <div>
                        <p class="text-[10px] font-bold tracking-[0.2em] uppercase text-gray-500">Status</p>
                        <p class="text-sm font-bold text-gray-800 flex items-center gap-1">
                            <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                            Pronto para saque
                        </p>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] font-bold tracking-[0.2em] uppercase text-gray-500">Saldo Disponível</p>
                        <p class="text-xl font-extrabold text-green-500">R$ 127,50</p>
                    </div>
                </div>
            </div>

        </div>
    </div>
</body>
</html>
