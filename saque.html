<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Saque</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-900 antialiased min-h-screen">
    <div id="root">
        <div class="min-h-screen">
            
            <div class="fixed top-0 left-0 right-0 z-50 bg-white border-t-[6px] border-black shadow-sm">
                <div class="max-w-2xl mx-auto px-6 h-16 flex items-center justify-center">
                    <img src="URL_DA_SUA_IMAGEM_AQUI.png" alt="Logo" class="h-8 object-contain">
                </div>
                
                <div class="h-1 bg-gray-100">
                    <div class="h-full bg-black transition-all duration-500 ease-out" style="width: 100%;"></div>
                </div>
            </div>

            <div class="pt-28 pb-32 px-6">
                <div class="max-w-md mx-auto animate-fade-in">
                    
                    <div class="flex items-center justify-center gap-2 mb-8">
                        <div class="flex items-center gap-2 px-5 py-2 bg-gray-100 border border-gray-200 rounded-full">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-gray-900" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                            <span id="animated-balance-top" class="text-xl font-extrabold text-black uppercase">R$ 0,00</span>
                            <span class="text-[10px] text-gray-500 font-bold uppercase tracking-widest ml-1">saldo</span>
                        </div>
                    </div>

                    <div class="text-center mb-8">
                        <h1 class="text-2xl font-black text-black uppercase tracking-tight mb-2">Avaliações Concluídas!</h1>
                        <p class="text-sm text-gray-500 font-medium">Preencha os dados abaixo para receber via PIX.</p>
                    </div>

                    <div class="bg-white p-6 rounded-2xl border border-gray-200 shadow-sm space-y-6">
                        
                        <div class="space-y-1.5">
                            <label class="block text-xs font-black text-black uppercase tracking-widest">Tipo de Chave PIX</label>
                            <div class="relative">
                                <select class="w-full px-4 py-4 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 text-sm focus:ring-2 focus:ring-black focus:border-transparent outline-none appearance-none font-medium">
                                    <option value="" disabled selected>Selecione...</option>
                                    <option value="cpf">CPF / CNPJ</option>
                                    <option value="telefone">Telefone</option>
                                    <option value="email">E-mail</option>
                                    <option value="aleatoria">Chave Aleatória</option>
                                </select>
                                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-black">
                                    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7" stroke-width="3"></path></svg>
                                </div>
                            </div>
                        </div>

                        <div class="space-y-1.5">
                            <label class="block text-xs font-black text-black uppercase tracking-widest">Sua Chave PIX</label>
                            <input type="text" placeholder="Digite sua chave" class="w-full px-4 py-4 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 text-sm focus:ring-2 focus:ring-black focus:border-transparent outline-none font-medium">
                        </div>

                        <div class="space-y-1.5">
                            <label class="block text-xs font-black text-black uppercase tracking-widest">Nome do Titular</label>
                            <input type="text" placeholder="Nome completo" class="w-full px-4 py-4 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 text-sm focus:ring-2 focus:ring-black focus:border-transparent outline-none font-medium">
                        </div>

                        <button class="w-full flex items-center justify-center gap-2 mt-4 px-4 py-5 bg-black hover:bg-gray-800 text-white font-black uppercase tracking-widest rounded-xl transition-all shadow-xl shadow-gray-300 active:scale-[0.98]">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                            </svg>
                            Finalizar Saque
                        </button>
                        
                        <p class="flex items-center justify-center gap-1.5 text-[10px] text-center text-gray-400 font-bold uppercase tracking-tighter">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg>
                            Pagamento processado de forma segura
                        </p>
                    </div>

                </div>
            </div>

            <div class="fixed bottom-0 left-0 right-0 z-40 bg-white/90 backdrop-blur-md border-t border-gray-200">
                <div class="max-w-md mx-auto px-6 py-4 flex items-center justify-between">
                    <div>
                        <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Total a receber</p>
                        <p id="animated-balance-bottom" class="text-xl font-black text-black">R$ 0,00</p>
                    </div>
                    <div class="text-right">
                        <span class="px-3 py-1 bg-black text-white text-[10px] font-black rounded-full uppercase tracking-tighter">
                            Pronto para Saque
                        </span>
                    </div>
                </div>
            </div>
            
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const topBalance = document.getElementById("animated-balance-top");
            const bottomBalance = document.getElementById("animated-balance-bottom");
            
            const targetValue = 755.49;
            const duration = 2000; // Tempo em milissegundos (2 segundos)
            
            function animateValue(element, start, end, duration) {
                let startTimestamp = null;
                const step = (timestamp) => {
                    if (!startTimestamp) startTimestamp = timestamp;
                    const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                    
                    // Efeito ease-out (começa rápido e desacelera no final)
                    const easeOutProgress = progress * (2 - progress);
                    
                    const currentVal = (easeOutProgress * (end - start) + start).toFixed(2);
                    
                    // Formata para o padrão Brasileiro: R$ XXX,XX
                    element.innerHTML = 'R$ ' + currentVal.replace('.', ',');
                    
                    if (progress < 1) {
                        window.requestAnimationFrame(step);
                    } else {
                        element.innerHTML = 'R$ ' + end.toFixed(2).replace('.', ',');
                    }
                };
                window.requestAnimationFrame(step);
            }

            // Inicia a animação para ambos os elementos de texto
            animateValue(topBalance, 0, targetValue, duration);
            animateValue(bottomBalance, 0, targetValue, duration);
        });
    </script>
</body>
</html>
