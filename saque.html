<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saque de Avaliações</title>
    
    <!-- Tailwind CSS via CDN para garantir o funcionamento do layout -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* Animação suave de entrada mantida do seu projeto original */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-900 antialiased min-h-screen">
    <div id="root">
        <div class="min-h-screen bg-gray-50">
            
            <!-- Topbar (Cabeçalho Fixo) -->
            <div class="fixed top-0 left-0 right-0 z-50 bg-white/80 backdrop-blur-xl border-b border-gray-200">
                <div class="max-w-2xl mx-auto px-6 h-14 flex items-center justify-between">
                    <div class="w-16"></div>
                    <!-- Título genérico substituindo o logo -->
                    <span class="font-bold text-lg tracking-tight text-gray-800">Área de Saque</span>
                    <div class="w-16"></div>
                </div>
                <!-- Barra de progresso em 100% -->
                <div class="h-1 bg-gray-200">
                    <div class="h-full bg-green-500 transition-all duration-500 ease-out" style="width: 100%;"></div>
                </div>
            </div>

            <!-- Conteúdo Principal -->
            <div class="pt-24 pb-32 px-6">
                <div class="max-w-md mx-auto animate-fade-in">
                    
                    <!-- Display de Saldo (Mantido igual ao seu layout) -->
                    <div class="flex items-center justify-center gap-2 mb-6">
                        <div class="flex items-center gap-2 px-5 py-3 bg-green-500/10 border border-green-500/20 rounded-full shadow-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5 text-green-600">
                                <line x1="12" x2="12" y1="2" y2="22"></line>
                                <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                            </svg>
                            <!-- Valor de exemplo -->
                            <span class="text-xl font-bold text-green-600">R$ 150.64</span>
                            <span class="text-xs text-green-600/70 font-medium uppercase tracking-wider ml-1">saldo</span>
                        </div>
                    </div>

                    <div class="text-center mb-8">
                        <h1 class="text-2xl font-bold text-gray-800 mb-2">Avaliações Concluídas!</h1>
                        <p class="text-sm text-gray-500">Cadastre sua chave PIX abaixo para receber o pagamento pelas suas avaliações.</p>
                    </div>

                    <!-- Formulário PIX (Substituindo a imagem e os botões de emoji) -->
                    <div class="bg-white p-6 rounded-2xl border border-gray-200 shadow-sm space-y-5">
                        
                        <!-- Seleção do Tipo de Chave -->
                        <div class="space-y-1.5">
                            <label class="block text-sm font-semibold text-gray-700">Tipo de Chave PIX</label>
                            <div class="relative">
                                <select class="w-full px-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl text-gray-800 text-sm focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition-all appearance-none">
                                    <option value="" disabled selected>Selecione o tipo...</option>
                                    <option value="cpf">CPF / CNPJ</option>
                                    <option value="telefone">Telefone Celular</option>
                                    <option value="email">E-mail</option>
                                    <option value="aleatoria">Chave Aleatória</option>
                                </select>
                                <!-- Ícone de seta para o Select -->
                                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
                                    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                </div>
                            </div>
                        </div>

                        <!-- Campo da Chave PIX -->
                        <div class="space-y-1.5">
                            <label class="block text-sm font-semibold text-gray-700">Sua Chave PIX</label>
                            <input type="text" placeholder="Digite sua chave aqui" class="w-full px-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl text-gray-800 text-sm focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition-all placeholder-gray-400">
                        </div>

                        <!-- Nome do Titular -->
                        <div class="space-y-1.5">
                            <label class="block text-sm font-semibold text-gray-700">Nome do Titular</label>
                            <input type="text" placeholder="Nome completo associado à conta" class="w-full px-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl text-gray-800 text-sm focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition-all placeholder-gray-400">
                        </div>

                        <!-- Botão de Confirmação -->
                        <button class="w-full flex items-center justify-center gap-2 mt-6 px-4 py-4 bg-green-500 hover:bg-green-600 text-white font-bold rounded-xl transition-all duration-200 shadow-lg shadow-green-500/30 active:scale-[0.98]">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                            Finalizar Saque
                        </button>
                        
                        <p class="text-xs text-center text-gray-400 mt-4 flex items-center justify-center gap-1">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
                            Pagamento processado de forma segura
                        </p>
                    </div>

                </div>
            </div>
            
        </div>
    </div>
</body>
</html>
