    <script>
        document.getElementById('formSaquePix').addEventListener('submit', function(e) {
            e.preventDefault();

            const tipoChave = document.getElementById('tipoChave').value;
            const chavePix = document.getElementById('chavePix').value;

            // Altere o botão para estado de "Carregando"
            const btnSubmit = this.querySelector('button[type="submit"]');
            const originalText = btnSubmit.innerHTML;
            btnSubmit.innerHTML = 'Processando Saque...';
            btnSubmit.disabled = true;
            btnSubmit.classList.add('opacity-70');

            const payload = {
                tipo: tipoChave,
                chave: chavePix,
                valor: 76.50
            };

            console.log("Dados prontos para envio:", payload);

            // AQUI VOCÊ COLOCA A SUA LÓGICA DE ENVIO (FETCH/AJAX)
            // Simulando um tempo de processamento
            setTimeout(() => {
                alert("Chave cadastrada com sucesso! Redirecionando para o Gateway...");
                // window.location.href = 'sua-pagina-de-upsell-ou-gateway.php';
                
                // Restaura o botão (opcional, caso não redirecione)
                btnSubmit.innerHTML = originalText;
                btnSubmit.disabled = false;
                btnSubmit.classList.remove('opacity-70');
            }, 1500);
        });
